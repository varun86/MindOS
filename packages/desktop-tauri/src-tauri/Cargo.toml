[package]
name = "mindos-desktop-tauri"
version = "0.1.0"
description = "MindOS Desktop (Tauri spike)"
authors = ["MindOS Team"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "2.0", features = [] }

[dependencies]
tauri = { version = "2.0", features = ["protocol-asset", "tray-icon", "image-png"] }
tauri-plugin-shell = "2.0"
tauri-plugin-deep-link = "2.0"
tauri-plugin-global-shortcut = "2.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.11", features = ["json"] }
dirs = "5"
url = "2"
# Keep brotli's allocator family on the alloc-no-stdlib 2.x trait.
# The 2026-06-14 alloc-stdlib 0.2.3 / brotli-decompressor 5.0.2 releases
# can resolve alloc-no-stdlib 3.x while brotli 8.0.x still uses 2.x.
alloc-no-stdlib = "=2.0.4"
alloc-stdlib = "=0.2.2"
brotli-decompressor = "=5.0.1"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
