name: Publish to npm

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.5.32)'
        required: true

permissions:
  contents: read

jobs:
  publish:
    if: github.repository == 'GeminiLight/MindOS'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.17'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: packages/web/.next/cache
          key: nextjs-npm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'packages/web/package.json', 'packages/web/next.config.*') }}
          restore-keys: |
            nextjs-npm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-npm-${{ runner.os }}-
            nextjs-npm-

      - name: Build standalone package
        run: |
          pnpm --filter @geminilight/mindos build
          NODE_OPTIONS="--max-old-space-size=8192" pnpm --filter @mindos/web run build
          node scripts/prepare-standalone.mjs
          node scripts/prepare-static-web.mjs
          node scripts/stage-product-package.mjs
          node scripts/build-platform-packages.mjs

      - name: Smoke test standalone server
        run: |
          # Materialize assets and verify server starts + responds to health check
          node scripts/verify-standalone.mjs

      - name: Clean build artifacts before publish
        run: |
          rm -rf node_modules packages/web/node_modules packages/web/.next packages/mindos/node_modules
          echo "=== Verifying platform binary exists ==="
          ls -la packages/mindos-platforms/linux-x64/bin/mindos
          echo "=== Checking main tarball size ==="
          cd packages/mindos && npm pack --dry-run --ignore-scripts 2>&1 | tail -5

      - name: Publish main package to npm
        run: cd packages/mindos && npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Ensure latest tag points to this version
        run: |
          VERSION=$(node -p "require('./packages/mindos/package.json').version")
          echo "Setting latest dist-tag to ${VERSION}..."
          npm dist-tag add "@geminilight/mindos@${VERSION}" latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish platform packages to npm
        continue-on-error: true
        run: |
          for pkg in packages/mindos-platforms/*; do
            echo "Publishing $pkg"
            if ! (cd "$pkg" && npm publish --access public --ignore-scripts); then
              echo "::warning::Failed to publish $pkg. The main package can still run through the runtime archive fallback; check NPM_TOKEN package-creation permissions before relying on optional platform packages."
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify published package integrity
        run: |
          VERSION=$(node -p "require('./packages/mindos/package.json').version")
          echo "Verifying published package ${VERSION}..."
          cd /tmp && rm -rf mindos-pkg-verify && mkdir mindos-pkg-verify && cd mindos-pkg-verify
          npm pack "@geminilight/mindos@${VERSION}" 2>&1
          TGZ=$(ls -1 geminilight-mindos-*.tgz 2>/dev/null | head -1)
          if [ -z "$TGZ" ]; then
            echo "❌ npm pack failed — no .tgz file found"
            exit 1
          fi
          echo "Downloaded: $TGZ"

          # Main package should be lightweight and only contain the shim/runtime exports.
          for f in "bin/mindos-shim.cjs" "dist/index.js" "dist/protocols/acp/index.js" "dist/protocols/mcp-server/index.cjs"; do
            if ! tar -tzf "$TGZ" | grep -q "$f"; then
              echo "❌ Published package missing $f!"
              exit 1
            fi
            echo "   ✓ $f"
          done

          if ! tar -xOf "$TGZ" package/bin/mindos-shim.cjs | grep -q "DEFAULT_RUNTIME_MANIFEST_URL"; then
            echo "❌ Published CLI shim is missing runtime archive fallback"
            exit 1
          fi

          echo "✅ Main package integrity verified; platform packages are optional accelerators"
